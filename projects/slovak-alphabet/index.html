<!DOCTYPE html>
<html lang="sk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Slovak Alphabet</title>
  <meta property="og:title" content="Slovak Alphabet">
  <meta property="og:description" content="Interactive Slovak alphabet with audio pronunciation">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <a href="../../index.html" class="back-link">← back</a>
  </header>

  <main>
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">Slovak Alphabet</h1>
        <p class="page-desc">Click on a letter to hear its pronunciation</p>
        <div class="diacritics">
          <span>dĺžeň [&#180;] - long</span>
          <span>mäkčeň [&#711;] - soft</span>
          <span>dve bodky [&#168;] - also soft</span>
          <span>vokáň [&#710;] - yo</span>
        </div>
        <div class="legend">
          <span class="legend-item vowel-label">vowel</span>
          <span class="legend-item consonant-label">consonant</span>
        </div>
      </div>

      <div id="lettersGrid" class="letters-grid"></div>

    </div>
  </main>

  <audio id="audioPlayer"></audio>
  <script src="js/script.js"></script>

</body>

</html>
